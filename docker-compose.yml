version: '3.8'

services:
  stock-detector:
    build: .
    container_name: stock-anomaly-detector
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    volumes:
      - ./model:/app/model  # Persist trained model
      - ./data:/app/data    # Persist data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
